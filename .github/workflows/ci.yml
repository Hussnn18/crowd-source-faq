# ═══════════════════════════════════════════════════════════════════════════════
#  Yaksha FAQ Portal — CI Pipeline
#  Runs on every push and PR to main/develop.
#  Jobs: lint + typecheck, unit tests, Docker build verification.
# ═══════════════════════════════════════════════════════════════════════════════

name: CI — Lint, Test, Build Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  # ── Lint & TypeScript Typecheck ────────────────────────────────────────────
  typecheck:
    name: TypeScript Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npx tsc --noEmit --project frontend/tsconfig.json

      - name: Typecheck backend
        run: npx tsc --noEmit --project backend/tsconfig.json

  # ── Unit Tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:run --workspace=frontend

      - name: Run backend tests
        run: npm run test --workspace=backend

  # ── Docker Build Check (no push) ──────────────────────────────────────────
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          tags: csfaq-frontend:ci-test

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: csfaq-backend:ci-test
